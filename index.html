<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offerte Orarie — Le migliori offerte Amazon</title>
    <meta name="description" content="Le migliori offerte Amazon selezionate e verificate, aggiornate ogni ora.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏰</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #222632;
            --border: #2a2e3a;
            --text: #e4e6ed;
            --text-dim: #8b8fa3;
            --accent: #ff6b35;
            --accent-hover: #ff8255;
            --green: #22c55e;
            --red: #ef4444;
            --badge-bg: #1e3a2f;
            --badge-text: #4ade80;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .logo span { color: var(--accent); }

        .tg-btn {
            background: #2AABEE;
            color: #fff;
            text-decoration: none;
            padding: .5rem 1rem;
            border-radius: 8px;
            font-size: .85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: opacity .2s;
        }

        .tg-btn:hover { opacity: .85; }

        /* Stats bar */
        .stats-bar {
            max-width: 1000px;
            margin: 1rem auto;
            padding: 0 1rem;
            display: flex;
            gap: 1.5rem;
            font-size: .85rem;
            color: var(--text-dim);
        }

        .stats-bar strong { color: var(--text); }

        /* Grid */
        .grid {
            max-width: 1000px;
            margin: 1rem auto;
            padding: 0 1rem 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color .2s, transform .15s;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            background: #fff;
            padding: 1rem;
        }

        .card-body { padding: 1rem; }

        .card-title {
            font-size: .9rem;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: .7rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-prices {
            display: flex;
            align-items: baseline;
            gap: .5rem;
            margin-bottom: .5rem;
        }

        .price-now {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
        }

        .price-was {
            font-size: .9rem;
            color: var(--text-dim);
            text-decoration: line-through;
        }

        .discount-badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            font-size: .75rem;
            font-weight: 700;
            padding: .2rem .5rem;
            border-radius: 4px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: .7rem;
        }

        .score {
            font-size: .8rem;
            color: var(--text-dim);
        }

        .score strong { color: var(--accent); }

        .card-cta {
            display: block;
            text-align: center;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            padding: .65rem;
            font-weight: 700;
            font-size: .85rem;
            transition: background .2s;
        }

        .card-cta:hover { background: var(--accent-hover); }

        .badge-minimo {
            background: #3b1a1a;
            color: var(--red);
            font-size: .7rem;
            font-weight: 700;
            padding: .15rem .4rem;
            border-radius: 4px;
            margin-bottom: .5rem;
            display: inline-block;
        }

        .stars { color: #fbbf24; font-size: .8rem; }

        /* Loading & empty */
        .status {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-dim);
            font-size: 1rem;
        }

        .status .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-dim);
            font-size: .75rem;
            border-top: 1px solid var(--border);
        }

        .footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            .header-inner { flex-wrap: wrap; gap: .5rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">⏰ <span>Offerte Orarie</span></div>
        <a class="tg-btn" href="https://t.me/offerte_orarie" target="_blank">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.53 8.1l-1.8 8.5c-.14.6-.5.75-.99.47l-2.76-2.04-1.33 1.28c-.15.15-.27.27-.56.27l.2-2.8 5.1-4.6c.22-.2-.05-.3-.34-.12l-6.3 3.97-2.72-.85c-.59-.18-.6-.59.12-.88l10.63-4.1c.49-.18.92.12.75.88z"/></svg>
            Unisciti al canale
        </a>
    </div>
</header>

<div class="stats-bar" id="stats"></div>

<div class="grid" id="deals-grid">
    <div class="status" id="loading">
        <div class="spinner"></div>
        Caricamento offerte...
    </div>
</div>

<footer class="footer">
    <p>Le offerte contengono link affiliati Amazon. I prezzi possono variare.</p>
    <p style="margin-top:.3rem">Offerte Orarie &mdash; Aggiornato automaticamente ogni 10 minuti</p>
</footer>

<script>
const AFFILIATE = 'offerteorarie';
const DATA_URL = 'offers.json';

function amazonUrl(productID, host) {
    return `https://www.${host || 'amazon.it'}/dp/${productID}/?tag=${AFFILIATE}-21`;
}

function starsHtml(rating) {
    if (!rating) return '';
    const full = Math.floor(rating);
    const half = rating - full >= 0.5 ? 1 : 0;
    return '<span class="stars">' + '★'.repeat(full) + (half ? '½' : '') + '</span>';
}

function renderCard(deal) {
    const url = amazonUrl(deal.productID, deal.host);
    const priceNow = deal.price ? deal.price.toFixed(2) + '€' : '';
    const priceWas = deal.startPrice ? deal.startPrice.toFixed(2) + '€' : '';
    const discount = deal.discount ? `-${deal.discount}%` : '';
    const score = deal.roboScore?.total || 0;
    const minimo = deal.minimoStorico || deal.roboScore?.breakdown?.minimoStorico;

    let html = `<div class="card">`;

    if (deal.image) {
        html += `<a href="${url}" target="_blank"><img class="card-img" src="${deal.image}" alt="${(deal.title||'').slice(0,60)}" loading="lazy"></a>`;
    }

    html += `<div class="card-body">`;

    if (minimo) html += `<div class="badge-minimo">📉 Minimo storico</div>`;

    html += `<div class="card-title">${deal.title || deal.productID}</div>`;
    html += `<div class="card-prices">`;
    if (priceNow) html += `<span class="price-now">${priceNow}</span>`;
    if (priceWas) html += `<span class="price-was">${priceWas}</span>`;
    if (discount) html += `<span class="discount-badge">${discount}</span>`;
    html += `</div>`;

    html += `<div class="card-meta">`;
    html += `<span class="score">DealScore: <strong>${score}</strong>/100</span>`;
    if (deal.rating) html += starsHtml(deal.rating);
    html += `</div>`;

    html += `</div>`; // card-body
    html += `<a class="card-cta" href="${url}" target="_blank">🛒 Vai all'offerta</a>`;
    html += `</div>`;

    return html;
}

async function load() {
    const grid = document.getElementById('deals-grid');
    const stats = document.getElementById('stats');

    try {
        const res = await fetch(DATA_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error('Fetch failed');
        const data = await res.json();

        const deals = (data.deals || [])
            .filter(d => d.roboScore?.total >= 0)
            .sort((a, b) => (b.roboScore?.total || 0) - (a.roboScore?.total || 0));

        if (!deals.length) {
            grid.innerHTML = '<div class="status">Nessuna offerta disponibile al momento. Torna tra poco!</div>';
            return;
        }

        stats.innerHTML = `
            <span><strong>${deals.length}</strong> offerte attive</span>
            <span>Aggiornato: <strong>${new Date(data.updatedAt).toLocaleString('it-IT')}</strong></span>
        `;

        grid.innerHTML = deals.map(renderCard).join('');

    } catch (err) {
        grid.innerHTML = '<div class="status">Impossibile caricare le offerte. Riprova tra poco.</div>';
    }
}

load();
// Refresh automatico ogni 5 minuti
setInterval(load, 5 * 60 * 1000);
</script>

</body>
</html>
